version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVICE_NAME: gateway
      HTTP_PORT: "8080"
      MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD}@tcp(172.17.0.1:3306)/datapilot_db?charset=utf8mb4&parseTime=True&loc=Local"
      FILE_SERVICE_URL: http://file-service:8081
      SCHEDULER_SERVICE_URL: http://scheduler-service:8082
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  file-service:
    build:
      context: .
      dockerfile: ./file-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SERVICE_NAME: file-service
      HTTP_PORT: "8081"
      MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD}@tcp(172.17.0.1:3306)/datapilot_db?charset=utf8mb4&parseTime=True&loc=Local"
      FILE_STORAGE_PATH: /data/files
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: info
    volumes:
      - file_storage:/data/files
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  scheduler-service:
    build:
      context: .
      dockerfile: ./scheduler-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SERVICE_NAME: scheduler-service
      HTTP_PORT: "8082"
      MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD}@tcp(172.17.0.1:3306)/datapilot_db?charset=utf8mb4&parseTime=True&loc=Local"
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin-ui:
    build:
      context: .
      dockerfile: ./admin-ui/Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080

volumes:
  file_storage:
